<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Users - VisitorFlow</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/fontawesome/css/all.min.css">
</head>

<body>
  <div class="container">
    <aside class="sidebar"><a href="index.html" class="logo">VisiLog</a></aside>
    <main class="main-content">
      <header class="main-header">
        <h1>User Management</h1>
      </header>
      <section class="card">
        <h2>Existing Users</h2>
        <table id="usersTable">
          <thead>
            <tr>
              <th>Email</th>
              <th>Role</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
      <section class="card">
        <h2>Add User</h2>
        <div class="form-group"><label>Name</label><input id="username" type="text"></div>
        <div class="form-group"><label>Email</label><input id="email" type="email"></div>
        <div class="form-group"><label>Password</label><input id="passwordd" type="password"></div>
        <div class="form-group"><label>Role</label><select id="role_name">
            <option>Admin</option>
            <option>Manager</option>
            <option>Security</option>
          </select></div>
        <div class="btn-row"><button id="addUserBtn" class="btn-primary">Add User</button></div>
      </section>
    </main>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Edit User</h2>
        <input type="hidden" id="edit_user_id">
        <div class="form-group"><label>Name</label><input id="edit_username" type="text"></div>
        <div class="form-group"><label>Email</label><input id="edit_email" type="email"></div>
        <div class="form-group"><label>Role</label><select id="edit_role_name">
            <option>Admin</option>
            <option>Manager</option>
            <option>Security</option>
          </select></div>
        <div class="btn-row">
          <button id="saveUserBtn" class="btn-primary">Save Changes</button>
        </div>
      </div>
    </div>

  </div>
  <script src="../js/config.js"></script>
  <script src="../js/auth-check.js"></script>
  <script src="../js/V.Js"></script>
  <script src="../js/visitor.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/logout.js"></script>
</body>

</html>
